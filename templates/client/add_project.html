<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/project.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Add New Project</h2>

        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}

            {% for category, message in messages %}

            <div class="alert alert-{{ category }}">

                {{ message }}

            </div>

            {% endfor %}

            {% endif %}
            {% endwith %}

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">

                        Project Title

                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        name="description"
                        rows="5"
                        class="form-control"
                        required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Technology Used

                    </label>

                    <input
                        type="text"
                        name="technology"
                        class="form-control"
                        placeholder="Python, Flask, Bootstrap"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        GitHub Link

                    </label>

                    <input
                        type="url"
                        name="github"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Live Demo Link

                    </label>

                    <input
                        type="url"
                        name="live_demo"
                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Project Image

                    </label>

                    <input
                        type="file"
                        name="image"
                        class="form-control"
                        required>

                </div>

                <button
                    class="btn btn-primary">

                    Save Project

                </button>

                <a href="{{ url_for('client_dashboard') }}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
