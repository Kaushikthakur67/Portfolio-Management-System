<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Project</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/project.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h2>Edit Project</h2>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">

Project Title

</label>

<input
type="text"
name="title"
class="form-control"
value="{{ project.title }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Description

</label>

<textarea
name="description"
rows="5"
class="form-control"
required>{{ project.description }}</textarea>

</div>

<div class="mb-3">

<label class="form-label">

Technology Used

</label>

<input
type="text"
name="technology"
class="form-control"
value="{{ project.technology }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

GitHub Link

</label>

<input
type="url"
name="github"
class="form-control"
value="{{ project.github }}">

</div>

<div class="mb-3">

<label class="form-label">

Live Demo Link

</label>

<input
type="url"
name="live_demo"
class="form-control"
value="{{ project.live_demo }}">

</div>

<div class="mb-3">

<label class="form-label">

Current Image

</label>

<br>

{% if project.image %}

<img
src="{{ url_for('static', filename='uploads/projects/' + project.image) }}"
width="250"
class="img-thumbnail">

{% else %}

<p>No Image Uploaded</p>

{% endif %}

</div>

<div class="mb-3">

<label class="form-label">

Upload New Image

</label>

<input
type="file"
name="image"
class="form-control">

</div>

<button class="btn btn-warning">

Update Project

</button>

<a href="{{ url_for('my_projects') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>

</html>
