<!DOCTYPE html>

<html>

<head>

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static',filename='css/profile.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2>My Profile</h2>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label>Profile Photo</label>

<input
type="file"
name="profile_image"
class="form-control">

</div>

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="full_name"
class="form-control"
value="{{user.full_name}}">

</div>

<div class="mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{user.mobile}}">

</div>

<div class="mb-3">

<label>About Me</label>

<textarea
name="about"
class="form-control"
rows="4">{{user.about}}</textarea>

</div>

<div class="mb-3">

<label>Address</label>

<textarea
name="address"
class="form-control"
rows="3">{{user.address}}</textarea>

</div>

<div class="mb-3">

<label>GitHub</label>

<input
type="text"
name="github"
class="form-control"
value="{{user.github}}">

</div>

<div class="mb-3">

<label>LinkedIn</label>

<input
type="text"
name="linkedin"
class="form-control"
value="{{user.linkedin}}">

</div>

<button class="btn btn-primary">

Update Profile

</button>

</form>

</div>

</div>

</div>

</body>

</html>
